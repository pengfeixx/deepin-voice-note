suites:
  - suite_id: S01_startup_exit
    name: 启动与退出
    测试界面: 主窗口/标题栏
    测试功能: 应用启动、单窗口模式、关闭退出
    cases:
      - id: case_1634837
        name: 仅支持单个窗口开启
        测试界面: 主窗口
        测试功能: 单实例验证
        前置条件: 应用已启动
        AT元素引用: [n0]
        steps:
          - step_type: action
            description: 再次启动deepin-voice-note
          - step_type: assert
            description: 只显示一个窗口，不会打开第二个窗口
      - id: case_1634839
        name: 首次使用语音记事本应用，新建记事本
        测试界面: 主窗口/记事本列表
        测试功能: 首次使用新建记事本
        前置条件: 应用首次启动，无任何记事本
        AT元素引用: [n23, n24, n3, n6]
        steps:
          - step_type: action
            description: 点击右侧空状态"新建记事本"按钮
          - step_type: assert
            description: 正常新建记事本，记事本名称默认显示为"记事本"
          - step_type: action
            description: 点击左侧底部"新建记事本"按钮
          - step_type: assert
            description: 正常新建第二个记事本

  - suite_id: S02_titlebar_window
    name: 标题栏与窗口操作
    测试界面: 标题栏
    测试功能: 最小化、最大化、关闭、侧栏收起
    cases:
      - id: case_1676573
        name: 主界面显示
        测试界面: 主窗口
        测试功能: 主界面控件布局检查
        前置条件: 应用已启动
        AT元素引用: [n0, n3]
        steps:
          - step_type: assert
            description: 记事本主界面已打开
        status: unsupported
        reason: "QML应用大部分控件无AT-SPI名称，标题栏各按钮(列表缩放/搜索框/新建文本/语音记录/图片/主菜单/最小化/最大化/关闭)无法通过AT-SPI定位"
      - id: case_1676449
        name: 最小化
        测试界面: 标题栏
        测试功能: 最小化窗口
        前置条件: 应用已启动
        AT元素引用: [n0]
        steps:
          - step_type: action
            description: 点击标题栏最小化按钮
          - step_type: assert
            description: 语音记事本被最小化
        status: unsupported
        reason: "最小化按钮无AT-SPI名称，且恢复操作需Dock交互"
      - id: case_1676447
        name: 最大化
        测试界面: 标题栏
        测试功能: 最大化窗口
        前置条件: 应用已启动
        AT元素引用: [n0]
        steps:
          - step_type: action
            description: 点击右上角最大化按钮
          - step_type: assert
            description: 最大化显示语音记事本
        status: unsupported
        reason: "最大化按钮无AT-SPI名称，无法通过AT-SPI定位"
      - id: case_1676445
        name: 关闭主界面
        测试界面: 标题栏
        测试功能: 关闭应用
        前置条件: 应用已启动
        AT元素引用: [n0]
        steps:
          - step_type: action
            description: 点击工具栏右上角关闭按钮
          - step_type: assert
            description: 退出应用
        status: unsupported
        reason: "关闭按钮无AT-SPI名称，可通过dtk_main_menu退出替代"
      - id: case_1635223
        name: 关闭主界面(1050)
        测试界面: 标题栏
        测试功能: 关闭应用
        前置条件: 应用已启动
        AT元素引用: [n0]
        status: unsupported
        reason: "与case_1676445重复，关闭按钮无AT-SPI名称"
      - id: case_1625247
        name: 关闭主界面(1050标题栏)
        测试界面: 标题栏
        测试功能: 关闭应用
        前置条件: 应用已启动
        status: unsupported
        reason: "与case_1676445重复"
      - id: case_1676379
        name: 收起/展开记事本列表
        测试界面: 标题栏
        测试功能: 侧栏切换
        前置条件: 应用已启动且存在记事本
        AT元素引用: [sidebarToggleBtn]
        steps:
          - step_type: action
            description: 点击标题栏侧栏切换按钮
          - step_type: assert
            description: 记事本列表收起
          - step_type: action
            description: 再次点击侧栏切换按钮
          - step_type: assert
            description: 记事本列表展开
        needs_accessible_name: true
        reason: "sidebarToggleBtn无AT-SPI名称，needs_accessible_name"

