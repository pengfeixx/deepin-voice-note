# ============================================================
# cases_mapped.yaml - deepin-voice-note AT-SPI语义映射用例
# ============================================================
#
# === 格式范例 ===
#
# 本文件为 youqu at generate 的输入文件，每个 case 包含:
#
#   id:               用例原始ID
#   name:             用例名称
#   module:           所属模块
#   status:           active | unsupported
#   reason:           当 status=unsupported 时填写原因
#   needs_accessible_name: true/false，标记需要 QML 元素添加 accessible name
#
#   steps:            步骤列表
#     - step_type:    action | assert
#       action:       session_start | session_stop | element_action |
#                       dtk_main_menu | dtk_context_menu |
#                       keyboard_press | keyboard_hot_key | keyboard_type |
#                       mouse_click | mouse_right_click | mouse_double_click |
#                       assert_element | assert_window | assert_not_exists |
#                       assert_window_count | assert_process_running |
#                       assert_process_not_running
#       selector:     AT-SPI 元素选择器 {role, name, ref}
#       items:        菜单项列表 (dtk_main_menu / dtk_context_menu)
#       key:          按键 (keyboard_press: "enter"; keyboard_hot_key: "ctrl+n")
#       text:         输入文本 (keyboard_type，必须是真实输入数据)
#       command:      启动命令 (session_start)
#       wait:         等待时间 (session_start: 3.0)
#       assertion:    断言类型 (assert_window)
#       description:   步骤描述
#
#   AT元素引用:
#     Runtime:  n0(主窗口), n3(新建记事本按钮), n6(记事本项),
#               n16(已选择X个笔记), n23(空状态提示),
#               n24(空状态新建记事本), n26(移动弹窗), n27(移动笔记标题),
#               n31(取消按钮), n32(确定按钮), n34(空对话框)
#     Static:   sidebarToggleBtn, newNoteBtn, recordBtn, insImgBtn,
#               searchBtn, searchEdit, pauseBtn, stopBtn,
#               multiSelectMoveBtn, multiSelectSaveNoteBtn,
#               multiSelectSaveVoiceBtn, multiSelectDeleteBtn,
#               noteListItem, editorWebEngine
# ============================================================

